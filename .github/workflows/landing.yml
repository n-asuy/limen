name: Deploy landing page

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/landing.yml"
  workflow_dispatch:

concurrency:
  group: landing-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Public build-time value: safe to keep in plaintext (not a secret).
      CLOUDFLARE_ACCOUNT_ID: 91a0964d12225d98106b2a92cb07a6d2
    steps:
      - uses: actions/checkout@v4

      # Fail fast: never ship from CI without the deploy credential configured.
      - name: Verify credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is not set. Aborting deploy." >&2
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy landing --project-name limen-lp --branch main
