name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Build macOS release
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Validate release tag
        shell: bash
        run: |
          version="$(python3 -c 'import json; print(json.load(open("src-tauri/tauri.conf.json"))["version"])')"
          expected_tag="v${version}"

          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Git tag ${GITHUB_REF_NAME} does not match app version ${expected_tag}" >&2
            exit 1
          fi

      - name: Validate signing secrets
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # createUpdaterArtifacts is on, so the bundler must minisign the
          # update artifact. Without this key the build fails anyway; check
          # up front so the reason is obvious.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          # Fail fast: an unsigned build breaks Gatekeeper and resets the
          # user's Accessibility grant on every update. Never ship one.
          missing=""
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID TAURI_SIGNING_PRIVATE_KEY; do
            if [[ -z "${!name}" ]]; then
              missing="${missing} ${name}"
            fi
          done
          if [[ -n "${missing}" ]]; then
            echo "Missing signing secrets:${missing}" >&2
            echo "Configure them in repository settings before tagging a release." >&2
            exit 1
          fi

      - name: Get release notes from tag annotation
        id: notes
        shell: bash
        run: |
          # Use the annotated tag message (the CHANGELOG entry for this
          # version) as the release body. Never auto-generate notes from
          # commit subjects: those carry internal task IDs and raw prompts.
          notes="$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" | head -c 20000)"
          if [[ -z "${notes// }" ]]; then
            echo "Tag ${GITHUB_REF_NAME} has no annotation. Annotate it with the CHANGELOG entry:" >&2
            echo "  git tag -a ${GITHUB_REF_NAME} -F CHANGELOG-entry.md" >&2
            exit 1
          fi
          {
            echo "body<<RELEASE_NOTES_EOF"
            echo "$notes"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Signs the updater artifact + latest.json so the installed app can
          # verify updates against the pubkey baked into tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Limen ${{ github.ref_name }}
          releaseBody: ${{ steps.notes.outputs.body }}
          generateReleaseNotes: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          tauriScript: bun tauri
          args: --target universal-apple-darwin
